name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
      - "dev/**"
      - "dev__*"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, typecheck and tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup npm
        run: npm install -g npm@10.9.0

      - name: Install dependencies
        run: npm ci

      - name: Production dependency security audit
        run: npm run audit:prod

      - name: File size baseline
        run: npm run filesize

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Full typecheck without skipLibCheck
        run: npm run typecheck:full

      - name: Backend/frontend API contracts
        run: npm run contracts:check

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Build production image
        run: >-
          docker build
          --build-arg APP_REVISION=${{ github.sha }}
          --build-arg IMAGE_SOURCE=https://github.com/${{ github.repository }}
          --build-arg NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          --tag snabix-frontend:ci
          .

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e:full

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: playwright-report
          retention-days: 7
